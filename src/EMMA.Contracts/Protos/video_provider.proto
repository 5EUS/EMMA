syntax = "proto3";

package emma.plugins;

option csharp_namespace = "EMMA.Contracts.Plugins";

import "request_context.proto";

service VideoProvider {
  rpc GetStreams (StreamRequest) returns (StreamResponse);
  rpc GetSegment (SegmentRequest) returns (SegmentResponse);
}

message StreamRequest {
  string media_id = 1;
  RequestContext context = 100;
}

message StreamResponse {
  repeated StreamInfo streams = 1;
}

message SegmentRequest {
  string media_id = 1;
  string stream_id = 2;
  int32 sequence = 3;
  RequestContext context = 100;
}

message SegmentResponse {
  bytes payload = 1;
  string content_type = 2;
}

message StreamInfo {
  string id = 1;
  string label = 2;
  string playlist_uri = 3;
  map<string, string> request_headers = 4;
  string request_cookies = 5;
  string stream_type = 6;
  bool is_live = 7;
  bool drm_protected = 8;
  string drm_scheme = 9;
  repeated MediaTrack audio_tracks = 10;
  repeated MediaTrack subtitle_tracks = 11;
  string default_audio_track_id = 12;
  string default_subtitle_track_id = 13;
}

message MediaTrack {
  string id = 1;
  string label = 2;
  string language = 3;
  string codec = 4;
  bool is_default = 5;
}
