name: ci

on:
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore
        run: dotnet restore EMMA.sln

      - name: Build
        run: dotnet build EMMA.sln --configuration Release --no-restore

      - name: Install dotnet-format
        run: dotnet tool install --global dotnet-format

      - name: Format check
        run: dotnet format EMMA.sln --verify-no-changes

      - name: Test
        run: dotnet test EMMA.sln --configuration Release --no-build
