name: publish-nuget

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Derive package version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore EMMA.sln

      - name: Pack EMMA.Contracts
        run: |
          dotnet pack src/EMMA.Contracts/EMMA.Contracts.csproj \
            -c Release \
            -o artifacts/nuget \
            -p:Version=$PACKAGE_VERSION

      - name: Pack EMMA.Plugin.Common
        run: |
          dotnet pack src/EMMA.Plugin.Common/EMMA.Plugin.Common.csproj \
            -c Release \
            -o artifacts/nuget \
            -p:Version=$PACKAGE_VERSION

      - name: Pack EMMA.Plugin.AspNetCore
        run: |
          dotnet pack src/EMMA.Plugin.AspNetCore/EMMA.Plugin.AspNetCore.csproj \
            -c Release \
            -o artifacts/nuget \
            -p:Version=$PACKAGE_VERSION

      - name: Push packages to NuGet
        run: |
          dotnet nuget push artifacts/nuget/*.nupkg \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
