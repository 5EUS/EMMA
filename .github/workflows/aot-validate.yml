name: aot-validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-aot:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Validate Native AOT
        run: ./scripts/validate-aot.sh
